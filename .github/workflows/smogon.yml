name: Update VGC Stats (Pikalytics)

on:
  schedule:
    - cron: '0 14 */3 * *'  # every 3 days at 14:00 UTC
  workflow_dispatch:          # manual trigger from GitHub UI
  push:
    paths:
      - '.github/workflows/smogon.yml'   # auto-run once on first push

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Pikalytics stats
        run: python scripts/fetch_pikalytics.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add smogon_vgc.json
          git diff --staged --quiet && echo "No changes to commit." || (
            git commit -m "chore: update VGC stats $(date +'%Y-%m-%d')"
            git push
          )
